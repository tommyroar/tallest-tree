<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PNW Canopy Height Explorer</title>

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: #0c0e13;
    color: #d0d4dc;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  /* ---- Top Bar ---- */
  #sidebar {
    background: #11131a;
    border-bottom: 1px solid #1e2230;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    flex-shrink: 0;
  }
  #sidebar-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    cursor: pointer;
    user-select: none;
    transition: background .15s;
    min-height: 44px;
  }
  #sidebar-header:hover { background: #1e2230; }
  #sidebar h2 {
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: #e4e8f0;
    margin: 0;
  }
  #collapse-btn {
    background: none; border: none; color: #5a6070; cursor: pointer;
    font-size: 18px; line-height: 1; padding: 4px 8px; transition: transform .2s;
    pointer-events: none;
  }
  #sidebar.collapsed #collapse-btn { transform: rotate(180deg); }
  #unit-toggle {
    display: flex; align-items: center; background: #1e2230; border: 1px solid #2d3347;
    border-radius: 4px; overflow: hidden; margin-right: 4px; pointer-events: all;
  }
  #unit-toggle button {
    background: none; border: none; color: #5a6070; cursor: pointer;
    font-size: 11px; font-weight: 600; padding: 3px 7px; transition: background .15s, color .15s;
  }
  #unit-toggle button.active { background: #2d3347; color: #e4e8f0; }
  #sidebar-body {
    max-height: 45vh;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 0;
    transition: max-height .3s ease, opacity .2s ease;
  }
  #sidebar.collapsed #sidebar-body {
    max-height: 0;
    opacity: 0;
    overflow: hidden;
  }
  .section { padding: 8px 16px 12px; border-top:1px solid #1e2230; }
  .section-label { font-size:11px; text-transform:uppercase; color:#5a6070; letter-spacing:.08em; margin-bottom:6px; }

  /* ---- Map ---- */
  #map-wrap { flex:1; position:relative; }
  #map { width:100%; height:100%; }

  /* Desaturate map tiles */
  .leaflet-tile-pane { filter: saturate(0.3) brightness(0.85); }
  .leaflet-control-attribution { font-size:10px; opacity:.6; }

  /* Stats grid */
  .stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
  .stat { background:#181b24; border-radius:6px; padding:8px 10px; }
  .stat .val { font-size:18px; font-weight:700; color:#e4e8f0; }
  .stat .lbl { font-size:10px; color:#5a6070; text-transform:uppercase; }

  /* Forest silhouette visualization */
  #forest-section { height: 22vh; min-height: 120px; overflow: hidden; display: flex; flex-direction: column; }
  #forest-viz { width: 100%; flex: 1 1 auto; min-height: 100px; display: block; background: #0c0e13; }
  #forest-viz .tree-sil {
    cursor: pointer;
    transition: opacity .15s, filter .15s;
  }
  #forest-viz .tree-sil:hover { filter: brightness(2); }
  #forest-viz .tree-sil.highlighted { filter: brightness(2.5) drop-shadow(0 0 6px rgba(255,255,255,0.5)); }

  /* ---- Ground Truth Modal ---- */
  #gt-modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 2000;
    background: rgba(0,0,0,.55); backdrop-filter: blur(2px);
    align-items: center; justify-content: center;
  }
  #gt-modal-overlay.active { display: flex; }
  #gt-modal {
    background: #11131a; border: 1px solid #1e2230; border-radius: 12px;
    width: 340px; max-height: 85vh; overflow-y: auto;
    font-family: 'JetBrains Mono', monospace; font-size: 13px;
    box-shadow: 0 12px 40px rgba(0,0,0,.6);
  }
  #gt-modal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px; border-bottom: 1px solid #1e2230;
  }
  #gt-modal-header .gt-tree-title { font-weight: 700; color: #e4e8f0; font-size: 15px; }
  #gt-modal-header .gt-tree-tier { font-size: 11px; margin-left: 8px; }
  #gt-modal-close {
    background: none; border: none; color: #5a6070; font-size: 20px;
    cursor: pointer; padding: 0 4px; line-height: 1;
  }
  #gt-modal-close:hover { color: #d0d4dc; }

  .gt-section { padding: 12px 16px; border-bottom: 1px solid #1e2230; }
  .gt-section:last-child { border-bottom: none; }
  .gt-section-label { font-size: 10px; text-transform: uppercase; color: #5a6070; letter-spacing: .08em; margin-bottom: 8px; }

  .gt-nav-grid { display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: start; }
  .gt-nav-stats { display: flex; flex-direction: column; gap: 6px; }
  .gt-row { display: flex; justify-content: space-between; align-items: center; }
  .gt-label { font-size: 11px; color: #5a6070; }
  .gt-value { font-size: 13px; font-weight: 700; color: #e4e8f0; }
  .gt-value.bearing { color: #6dce70; }

  .gt-compass {
    width: 72px; height: 72px;
    position: relative; border-radius: 50%;
    border: 2px solid #2a2e3a; background: #0c0e13; flex-shrink: 0;
  }
  .gt-compass-needle {
    position: absolute; top: 50%; left: 50%;
    width: 2px; height: 28px; background: #6dce70;
    transform-origin: bottom center; border-radius: 1px;
  }
  .gt-compass-n { position: absolute; top: 2px; left: 50%; transform: translateX(-50%); font-size: 9px; color: #ff4444; font-weight: 700; }
  .gt-compass-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 6px; height: 6px; border-radius: 50%; background: #d0d4dc; }

  .gt-gps-btn {
    margin-top: 8px; width: 100%; padding: 7px;
    background: #1e2230; color: #8a90a0; border: 1px solid #2a2e3a; border-radius: 6px;
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    cursor: pointer; transition: background .15s;
  }
  .gt-gps-btn:hover { background: #2a2e3a; }
  .gt-gps-btn.located { border-color: #3d8b40; color: #6dce70; }

  .gt-form { background: #181b24; border-radius: 6px; padding: 12px; }
  .gt-form label { display: block; font-size: 11px; color: #5a6070; margin-bottom: 3px; margin-top: 8px; }
  .gt-form label:first-child { margin-top: 0; }
  .gt-form input {
    width: 100%; padding: 6px 8px; border-radius: 4px;
    border: 1px solid #2a2e3a; background: #0c0e13; color: #e4e8f0;
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
  }
  .gt-form input:focus { outline: none; border-color: #3d8b40; }
  .gt-form .gt-calc-btn {
    margin-top: 12px; width: 100%; padding: 8px;
    background: #3d8b40; color: #fff; border: none; border-radius: 6px;
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    font-weight: 700; cursor: pointer; transition: background .15s;
  }
  .gt-form .gt-calc-btn:hover { background: #4da650; }
  .gt-form .gt-calc-btn:disabled { background: #2a2e3a; color: #5a6070; cursor: default; }

  .gt-result { background: #1a2420; border: 1px solid #3d8b40; border-radius: 6px; padding: 12px; margin-top: 10px; }
  .gt-result-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
  .gt-result-row:last-child { margin-bottom: 0; }
  .gt-result-label { font-size: 11px; color: #6dce70; }
  .gt-result-value { font-size: 13px; font-weight: 700; color: #e4e8f0; }
  .gt-result-delta { font-size: 12px; font-weight: 700; }
  .gt-result-delta.close { color: #6dce70; }
  .gt-result-delta.off { color: #ff8800; }
  .gt-result-delta.far { color: #ff4444; }

  /* Locate button */
  .leaflet-control-locate a {
    display: flex; align-items: center; justify-content: center;
    width: 30px; height: 30px; font-size: 18px; line-height: 30px;
    color: #333; text-decoration: none;
  }
  .leaflet-control-locate a svg { width: 16px; height: 16px; }
  .leaflet-control-locate.active a svg { color: #3d8b40; }
  .leaflet-control-locate.error a svg { color: #ff4444; }
  @keyframes locate-spin { to { transform: rotate(360deg); } }
  .leaflet-control-locate a svg.spin { animation: locate-spin .8s linear infinite; }

  /* Loading state */
  #loading {
    display:none;
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    background:rgba(12,14,19,.9); color:#8090a0; padding:18px 28px;
    border-radius:10px; font-family:'JetBrains Mono',monospace; font-size:13px;
    z-index:1000; pointer-events:none;
  }
  #loading.active { display:block; }

  /* Hint */
  #hint {
    position:absolute; bottom:24px; left:50%; transform:translateX(-50%);
    background:rgba(12,14,19,.85); color:#6a7a8a; padding:8px 16px;
    border-radius:8px; font-family:'JetBrains Mono',monospace; font-size:12px;
    z-index:999; pointer-events:none;
    transition: opacity .4s;
  }
</style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header" onclick="togglePanel()">
    <h2>PNW Canopy Height Explorer</h2>
    <div id="unit-toggle" onclick="event.stopPropagation()">
      <button id="btn-m" class="active" onclick="setUnits('m')">m</button>
      <button id="btn-ft" onclick="setUnits('ft')">ft</button>
    </div>
    <button id="collapse-btn" aria-label="Collapse panel">&#9650;</button>
  </div>
  <div id="sidebar-body">

    <div class="section" id="forest-section">
      <div class="section-label">Forest Profile</div>
      <svg id="forest-viz" preserveAspectRatio="xMidYMax meet"></svg>
    </div>

    <div class="section" id="stats-section">
      <div class="section-label">Statistics</div>
      <div class="stats-grid">
        <div class="stat"><div class="val" id="stat-max">—</div><div class="lbl">Max height</div></div>
        <div class="stat"><div class="val" id="stat-mean">—</div><div class="lbl">Mean height</div></div>
        <div class="stat"><div class="val" id="stat-trees">—</div><div class="lbl">Trees found</div></div>
        <div class="stat"><div class="val" id="stat-area">—</div><div class="lbl">Area (km²)</div></div>
      </div>
    </div>

  </div>
</div>

<div id="gt-modal-overlay" onclick="if(event.target===this)closeGtModal()">
  <div id="gt-modal">
    <div id="gt-modal-header">
      <div><span class="gt-tree-title" id="gt-title"></span><span class="gt-tree-tier" id="gt-tier"></span></div>
      <button id="gt-modal-close" onclick="closeGtModal()">&times;</button>
    </div>
    <div class="gt-section">
      <div class="gt-section-label">Navigation</div>
      <div class="gt-nav-grid">
        <div class="gt-nav-stats" id="gt-nav-stats"></div>
        <div class="gt-compass" id="gt-compass">
          <span class="gt-compass-n">N</span>
          <div class="gt-compass-needle" id="gt-compass-needle"></div>
          <div class="gt-compass-center"></div>
        </div>
      </div>
      <button class="gt-gps-btn" id="gt-gps-btn" onclick="acquireGPS()">Use GPS Location</button>
      <div id="gt-gps-info" style="font-size:11px; color:#5a6070; margin-top:6px;"></div>
    </div>
    <div class="gt-section">
      <div class="gt-section-label">Rangefinder Measurement</div>
      <div class="gt-form" id="gt-form">
        <label for="gt-dist-top">LOS Distance to Crown (m)</label>
        <input type="number" id="gt-dist-top" step="0.1" placeholder="e.g. 85.2" />
        <label for="gt-angle-top">Inclination Angle to Crown (&deg;)</label>
        <input type="number" id="gt-angle-top" step="0.1" placeholder="e.g. 42.5" />
        <label for="gt-dist-base">LOS Distance to Base (m)</label>
        <input type="number" id="gt-dist-base" step="0.1" placeholder="e.g. 63.0" />
        <label for="gt-angle-base">Declination Angle to Base (&deg;)</label>
        <input type="number" id="gt-angle-base" step="0.1" placeholder="e.g. -5.2" />
        <label for="gt-eye-height">Eye Height (m)</label>
        <input type="number" id="gt-eye-height" step="0.01" value="1.65" />
        <button class="gt-calc-btn" id="gt-calc-btn" onclick="calculateHeight()">Calculate Tree Height</button>
      </div>
      <div id="gt-result"></div>
    </div>
  </div>
</div>

<div id="map-wrap">
  <div id="map"></div>
  <div id="loading">Analyzing canopy…</div>
  <div id="hint">Click anywhere on the map to analyze tree canopy</div>
</div>

<script>
// ---- Units ----
let useFeet = false;
function fmtH(meters) {
  if (useFeet) return (meters * 3.28084).toFixed(1) + ' ft';
  return meters + ' m';
}
function fmtH1(meters) {
  if (useFeet) return (meters * 3.28084).toFixed(1) + ' ft';
  return meters.toFixed(1) + ' m';
}
function setUnits(unit) {
  useFeet = (unit === 'ft');
  document.getElementById('btn-m').classList.toggle('active', !useFeet);
  document.getElementById('btn-ft').classList.toggle('active', useFeet);
  refreshUnits();
}
function refreshUnits() {
  if (!window._lastData) return;
  const data = window._lastData;
  document.getElementById('stat-max').textContent = fmtH(data.stats.max_height);
  document.getElementById('stat-mean').textContent = fmtH(data.stats.mean_height);
  data.trees.forEach(t => {
    if (t._marker) t._marker.setTooltipContent(`#${t.rank} — ${fmtH(t.height_m)} (${t.tier})`);
  });
  renderForest(data.trees, window._lastLat, window._lastLng);
  if (gtSelectedTree) {
    document.getElementById('gt-title').textContent = `#${gtSelectedTree.rank} — ${fmtH(gtSelectedTree.height_m)}`;
    updateNavigation();
  }
}

// ---- Panel collapse ----
function togglePanel() {
  const sidebar = document.getElementById('sidebar');
  sidebar.classList.toggle('collapsed');
  // Invalidate map size after transition
  setTimeout(() => map.invalidateSize(), 320);
}

// ---- Map setup ----
window._map = L.map('map', {
  center: [46.8, -121.7],
  zoom: 8,
  maxBounds: [[41, -126], [50, -115]],
  zoomControl: true,
  tap: false,           // prevent phantom click-through on touch devices (Leaflet #7765)
});
const map = window._map;

L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
  maxZoom: 17,
  attribution: '© OpenTopoMap contributors',
}).addTo(map);

// ---- Locate control ----
const LocateControl = L.Control.extend({
  options: { position: 'topleft' },
  onAdd(map) {
    const container = L.DomUtil.create('div', 'leaflet-control-locate leaflet-bar');
    const link = L.DomUtil.create('a', '', container);
    link.href = '#';
    link.role = 'button';
    link.title = 'Show my location';
    link.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/></svg>';
    this._container = container;
    this._link = link;
    this._map = map;
    this._marker = null;
    L.DomEvent.disableClickPropagation(container);
    L.DomEvent.on(link, 'click', this._locate, this);
    return container;
  },
  _locate(e) {
    L.DomEvent.preventDefault(e);
    const self = this;
    if (!window.isSecureContext) {
      self._container.title = 'Geolocation requires HTTPS';
      self._container.classList.add('error');
      console.warn('Locate: geolocation requires a secure context (HTTPS or localhost)');
      return;
    }
    if (!navigator.geolocation) {
      self._container.title = 'Geolocation not supported';
      self._container.classList.add('error');
      return;
    }
    self._link.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="spin"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/></svg>';
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        const { latitude, longitude } = pos.coords;
        self._map.flyTo([latitude, longitude], 14);
        self._container.classList.add('active');
        self._container.classList.remove('error');
        self._link.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/></svg>';
        if (self._marker) self._map.removeLayer(self._marker);
        self._marker = L.circleMarker([latitude, longitude], {
          radius: 8, color: '#3d8b40', weight: 2, fillColor: '#3d8b40', fillOpacity: 0.3,
        }).addTo(self._map).bindTooltip('You', { permanent: true, direction: 'top' });
      },
      (err) => {
        console.warn('Locate failed:', err.message);
        self._container.classList.add('error');
        self._container.title = 'Location error: ' + err.message;
        self._link.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/></svg>';
      },
      { enableHighAccuracy: true, timeout: 10000 }
    );
  },
});
map.addControl(new LocateControl());

let markers = [];
let overlayLayer = null;
let clickMarker = null;

// Derive API base from current page path so it works behind subpath proxies
// e.g. /tallest-trees -> /tallest-trees, / -> (empty string)
const API = window.location.pathname.replace(/\/+$/, '');

// ---- Click handler ----
let _flyingTo = false;
map.on('movestart', () => { _flyingTo = true; });
map.on('moveend',   () => { setTimeout(() => { _flyingTo = false; }, 200); });
map.on('click', async (e) => {
  if (_flyingTo) return;                          // ignore clicks during flyTo
  const { lat, lng } = e.latlng;
  if (lat < 41 || lat > 50 || lng < -126 || lng > -115) return;

  document.getElementById('hint').style.opacity = '0';
  const loading = document.getElementById('loading');
  loading.classList.add('active');

  // Clear previous
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  if (overlayLayer) { map.removeLayer(overlayLayer); overlayLayer = null; }
  if (clickMarker) { map.removeLayer(clickMarker); clickMarker = null; }

  clickMarker = L.circleMarker([lat, lng], {
    radius: 6, color: '#ffffff', weight: 2, fillColor: '#ffffff', fillOpacity: 0.3,
  }).addTo(map);

  try {
    const resp = await fetch(`${API}/api/analyze?lat=${lat.toFixed(6)}&lon=${lng.toFixed(6)}&window=1000`);
    const data = await resp.json();

    if (data.error) { alert(data.error); return; }

    window._lastData = data;
    window._lastLat = lat;
    window._lastLng = lng;

    // Stats
    document.getElementById('stat-max').textContent = fmtH(data.stats.max_height);
    document.getElementById('stat-mean').textContent = fmtH(data.stats.mean_height);
    document.getElementById('stat-trees').textContent = data.stats.n_trees;
    document.getElementById('stat-area').textContent = (data.stats.area_m2 / 1e6).toFixed(2);

    // Overlay
    if (data.overlay_key && data.overlay_bounds) {
      const b = data.overlay_bounds;
      overlayLayer = L.imageOverlay(
        `${API}/api/overlay?key=${data.overlay_key}`,
        [[b.sw[0], b.sw[1]], [b.ne[0], b.ne[1]]],
        { opacity: 0.6 }
      ).addTo(map);
    }

    // Markers
    data.trees.forEach(t => {
      const m = L.circleMarker([t.lat, t.lon], {
        radius: Math.max(4, Math.min(10, t.height_m / 10)),
        color: t.colour,
        weight: 1.5,
        fillColor: t.colour,
        fillOpacity: 0.5,
      }).addTo(map);
      m.bindTooltip(`#${t.rank} — ${fmtH(t.height_m)} (${t.tier})`, { className: 'tree-tip' });
      m.on('click', () => highlightTree(t));
      t._marker = m;
      markers.push(m);
    });

    // Forest profile visualization
    renderForest(data.trees, lat, lng);

  } catch (err) {
    alert('Analysis failed: ' + err.message);
  } finally {
    loading.classList.remove('active');
  }
});

// ---- Tree silhouette definitions (PNW conifers) ----
const TREE_SILHOUETTES = [
  { // Douglas Fir — conical, slightly irregular, drooping lower branches
    id: 'sil-0', vb: '0 0 40 100',
    path: 'M20 0 L17 12 L12 14 L15 20 L9 24 L13 30 L7 35 L11 40 L5 46 L10 50 L4 56 L9 60 L3 67 L8 72 L2 78 L7 82 L3 88 L17 90 L17 100 L23 100 L23 90 L37 88 L33 82 L38 78 L32 72 L37 67 L31 60 L36 56 L30 50 L35 46 L29 40 L33 35 L27 30 L31 24 L25 20 L28 14 L23 12 Z'
  },
  { // Western Red Cedar — narrow pyramidal, buttressed trunk, drooping branches
    id: 'sil-1', vb: '0 0 36 100',
    path: 'M18 0 L16 10 L11 16 L14 22 L8 30 L12 35 L6 44 L10 48 L4 57 L9 62 L3 70 L8 74 L4 82 L14 88 L12 92 L12 100 L24 100 L24 92 L22 88 L32 82 L28 74 L33 70 L27 62 L32 57 L26 48 L30 44 L24 35 L28 30 L22 22 L25 16 L20 10 Z'
  },

// ---- Forest profile rendering ----
const SVG_NS = 'http://www.w3.org/2000/svg';

function renderForest(trees, centerLat, centerLon) {
  const svg = document.getElementById('forest-viz');
  svg.innerHTML = '';

  const vizTrees = trees.slice(0, 200);
  if (!vizTrees.length) return;

  // Inject silhouette symbols into defs
  const defs = document.createElementNS(SVG_NS, 'defs');
  TREE_SILHOUETTES.forEach(s => {
    const sym = document.createElementNS(SVG_NS, 'symbol');
    sym.setAttribute('id', s.id);
    sym.setAttribute('viewBox', s.vb);
    const p = document.createElementNS(SVG_NS, 'path');
    p.setAttribute('d', s.path);
    sym.appendChild(p);
    defs.appendChild(sym);
  });
  svg.appendChild(defs);

  // Measure container
  const rect = svg.getBoundingClientRect();
  const W = rect.width || 300;
  const H = rect.height || 160;
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);

  const SCALE_W = 36;
  const BOTTOM_H = 16;
  const TOP_PAD = 6;
  const FOREST_L = SCALE_W;
  const FOREST_R = W - SCALE_W;
  const FOREST_W = FOREST_R - FOREST_L;
  const GROUND_Y = H - BOTTOM_H;

  // Height calculations
  const heights = vizTrees.map(t => t.height_m);
  const maxH = Math.max(...heights);
  const minH = Math.min(...heights);
  const pxPerMeter = (GROUND_Y - TOP_PAD) / maxH;

  // Ground line
  const ground = document.createElementNS(SVG_NS, 'line');
  ground.setAttribute('x1', FOREST_L);
  ground.setAttribute('y1', GROUND_Y);
  ground.setAttribute('x2', FOREST_R);
  ground.setAttribute('y2', GROUND_Y);
  ground.setAttribute('stroke', '#1e2230');
  ground.setAttribute('stroke-width', '1');
  svg.appendChild(ground);

  // Draw scales on both sides
  drawForestScale(svg, maxH, pxPerMeter, GROUND_Y, 0, 'right', TOP_PAD);
  drawForestScale(svg, maxH, pxPerMeter, GROUND_Y, W - SCALE_W, 'left', TOP_PAD);

  // Compass labels along bottom
  const dirs = ['S', 'W', 'N', 'E', 'S'];
  dirs.forEach((d, i) => {
    const x = FOREST_L + (i / (dirs.length - 1)) * FOREST_W;
    const label = document.createElementNS(SVG_NS, 'text');
    label.setAttribute('x', x);
    label.setAttribute('y', H - 2);
    label.setAttribute('text-anchor', 'middle');
    label.setAttribute('fill', d === 'N' ? '#ff4444' : '#3a3f50');
    label.setAttribute('font-family', "'JetBrains Mono', monospace");
    label.setAttribute('font-size', '10');
    label.setAttribute('font-weight', d === 'N' ? '700' : '400');
    label.textContent = d;
    svg.appendChild(label);
  });

  // Sort ascending by height (painter's algorithm: tallest on top)
  const sorted = [...vizTrees].sort((a, b) => a.height_m - b.height_m);

  // Forest group
  const forestG = document.createElementNS(SVG_NS, 'g');
  forestG.classList.add('forest');

  sorted.forEach(t => {
    const silIdx = t.rank % TREE_SILHOUETTES.length;
    const sil = TREE_SILHOUETTES[silIdx];
    const vbParts = sil.vb.split(' ').map(Number);
    const aspect = vbParts[2] / vbParts[3];

    const treePxH = t.height_m * pxPerMeter;
    const treePxW = treePxH * aspect;

    // Compass bearing from center to tree
    const bearing = bearingBetween(centerLat, centerLon, t.lat, t.lon);
    // Map bearing so South=0 (left), North=0.5 (center), South=1.0 (right)
    const xNorm = ((bearing + 180) % 360) / 360;
    const x = FOREST_L + xNorm * (FOREST_W - treePxW);
    const y = GROUND_Y - treePxH;

    // Depth shading: shorter = lighter, taller = darker
    const depthFactor = (t.height_m - minH) / (maxH - minH || 1);
    const grey = Math.round(80 - depthFactor * 55); // 80 (light) to 25 (dark)
    const fill = `rgb(${grey},${grey},${grey})`;

    const use = document.createElementNS(SVG_NS, 'use');
    use.setAttributeNS('http://www.w3.org/1999/xlink', 'href', '#' + sil.id);
    use.setAttribute('x', x);
    use.setAttribute('y', y);
    use.setAttribute('width', treePxW);
    use.setAttribute('height', treePxH);
    use.setAttribute('fill', fill);
    use.classList.add('tree-sil');
    use.dataset.rank = t.rank;

    const title = document.createElementNS(SVG_NS, 'title');
    title.textContent = `#${t.rank} — ${fmtH(t.height_m)} (${t.tier})`;
    use.appendChild(title);

    use.addEventListener('click', (e) => { e.stopPropagation(); highlightTree(t); });
    forestG.appendChild(use);
  });

  svg.appendChild(forestG);
}

function drawForestScale(svg, maxH, pxPerMeter, groundY, offsetX, align, topPad) {
  const g = document.createElementNS(SVG_NS, 'g');

  // Tick interval
  let interval = 10;
  if (maxH > 60) interval = 20;
  if (maxH > 120) interval = 50;

  const lineX = align === 'right' ? offsetX + 30 : offsetX + 6;

  // Vertical line
  const line = document.createElementNS(SVG_NS, 'line');
  line.setAttribute('x1', lineX);
  line.setAttribute('y1', groundY);
  line.setAttribute('x2', lineX);
  line.setAttribute('y2', topPad);
  line.setAttribute('stroke', '#2a2e3a');
  line.setAttribute('stroke-width', '1');
  g.appendChild(line);

  for (let h = 0; h <= maxH; h += interval) {
    const y = groundY - h * pxPerMeter;
    if (y < topPad - 2) break;

    // Tick
    const tick = document.createElementNS(SVG_NS, 'line');
    const tickDir = align === 'right' ? -1 : 1;
    tick.setAttribute('x1', lineX);
    tick.setAttribute('y1', y);
    tick.setAttribute('x2', lineX + tickDir * 4);
    tick.setAttribute('y2', y);
    tick.setAttribute('stroke', '#2a2e3a');
    tick.setAttribute('stroke-width', '1');
    g.appendChild(tick);

    // Label
    const text = document.createElementNS(SVG_NS, 'text');
    text.setAttribute('x', align === 'right' ? lineX - 6 : lineX + 8);
    text.setAttribute('y', y + 3);
    text.setAttribute('text-anchor', align === 'right' ? 'end' : 'start');
    text.setAttribute('fill', '#3a3f50');
    text.setAttribute('font-family', "'JetBrains Mono', monospace");
    text.setAttribute('font-size', '9');
    text.textContent = useFeet ? Math.round(h * 3.28084) + 'ft' : h + 'm';
    g.appendChild(text);
  }

  svg.appendChild(g);
}

function highlightTree(tree) {
  // Fly map to tree
  map.flyTo([tree.lat, tree.lon], 16);

  // Flash the corresponding map marker
  markers.forEach(m => {
    const ll = m.getLatLng();
    if (Math.abs(ll.lat - tree.lat) < 0.00001 && Math.abs(ll.lng - tree.lon) < 0.00001) {
      m.setStyle({ color: '#ffffff', fillColor: '#ffffff', fillOpacity: 0.9, weight: 3 });
      m.setRadius(14);
      setTimeout(() => {
        m.setStyle({ color: tree.colour, fillColor: tree.colour, fillOpacity: 0.5, weight: 1.5 });
        m.setRadius(Math.max(4, Math.min(10, tree.height_m / 10)));
      }, 2000);
    }
  });

  // Highlight silhouette in SVG
  document.querySelectorAll('#forest-viz .tree-sil').forEach(el => el.classList.remove('highlighted'));
  const sil = document.querySelector(`#forest-viz .tree-sil[data-rank="${tree.rank}"]`);
  if (sil) sil.classList.add('highlighted');

  // Open ground truth modal
  openGtModal(tree);
}


// ---- Ground Truth Modal ----
let gtUserPos = null;      // {lat, lon}
let gtSelectedTree = null; // tree object from analysis
let gtViewMarker = null;
let gtLineLayer = null;

function openGtModal(tree) {
  gtSelectedTree = tree;
  const overlay = document.getElementById('gt-modal-overlay');

  // Header
  document.getElementById('gt-title').textContent = `#${tree.rank} — ${fmtH(tree.height_m)}`;
  const tierSpan = document.getElementById('gt-tier');
  tierSpan.textContent = tree.tier;
  tierSpan.style.color = tree.colour;

  // Reset measurement form
  document.getElementById('gt-result').innerHTML = '';

  updateNavigation();
  overlay.classList.add('active');
}

function closeGtModal() {
  document.getElementById('gt-modal-overlay').classList.remove('active');
  if (gtLineLayer) { map.removeLayer(gtLineLayer); gtLineLayer = null; }
}

function acquireGPS() {
  const btn = document.getElementById('gt-gps-btn');
  const info = document.getElementById('gt-gps-info');
  btn.textContent = 'Acquiring...';
  btn.disabled = true;

  if (!navigator.geolocation) {
    info.textContent = 'Geolocation not supported';
    btn.textContent = 'Use GPS Location';
    btn.disabled = false;
    return;
  }

  navigator.geolocation.getCurrentPosition(
    (pos) => {
      gtUserPos = { lat: pos.coords.latitude, lon: pos.coords.longitude };
      btn.textContent = `${gtUserPos.lat.toFixed(5)}, ${gtUserPos.lon.toFixed(5)}`;
      btn.classList.add('located');
      btn.disabled = false;
      info.textContent = `Accuracy: ±${pos.coords.accuracy.toFixed(0)} m`;

      // Place user marker
      if (gtViewMarker) map.removeLayer(gtViewMarker);
      gtViewMarker = L.circleMarker([gtUserPos.lat, gtUserPos.lon], {
        radius: 8, color: '#6dce70', weight: 2, fillColor: '#6dce70', fillOpacity: 0.3,
      }).addTo(map).bindTooltip('You', { permanent: true, direction: 'top', className: 'tree-tip' });

      if (gtSelectedTree) updateNavigation();
    },
    (err) => {
      info.textContent = 'GPS error: ' + err.message;
      btn.textContent = 'Retry GPS';
      btn.disabled = false;
    },
    { enableHighAccuracy: true, timeout: 15000 }
  );
}

function bearingBetween(lat1, lon1, lat2, lon2) {
  const toRad = d => d * Math.PI / 180;
  const toDeg = r => r * 180 / Math.PI;
  const dLon = toRad(lon2 - lon1);
  const y = Math.sin(dLon) * Math.cos(toRad(lat2));
  const x = Math.cos(toRad(lat1)) * Math.sin(toRad(lat2)) -
            Math.sin(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.cos(dLon);
  return (toDeg(Math.atan2(y, x)) + 360) % 360;
}

function haversineMeters(lat1, lon1, lat2, lon2) {
  const toRad = d => d * Math.PI / 180;
  const R = 6371000;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat / 2) ** 2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function compassDir(deg) {
  const dirs = ['N', 'NNE', 'NE', 'ENE', 'E', 'ESE', 'SE', 'SSE', 'S', 'SSW', 'SW', 'WSW', 'W', 'WNW', 'NW', 'NNW'];
  return dirs[Math.round(deg / 22.5) % 16];
}

function updateNavigation() {
  const t = gtSelectedTree;
  const stats = document.getElementById('gt-nav-stats');

  if (!gtUserPos) {
    stats.innerHTML = `
      <div class="gt-row"><span class="gt-label">Satellite Est.</span><span class="gt-value">${fmtH(t.height_m)} &pm;${fmtH1(t.error_m)}</span></div>
      <div class="gt-row"><span class="gt-label">Coords</span><span class="gt-value" style="font-size:11px">${t.lat.toFixed(5)}, ${t.lon.toFixed(5)}</span></div>
      <div style="font-size:10px; color:#5a6070; margin-top:4px;">Enable GPS for bearing &amp; distance</div>
    `;
    document.getElementById('gt-compass-needle').style.transform = 'translate(-50%, -100%) rotate(0deg)';
    return;
  }

  const dist = haversineMeters(gtUserPos.lat, gtUserPos.lon, t.lat, t.lon);
  const bearing = bearingBetween(gtUserPos.lat, gtUserPos.lon, t.lat, t.lon);
  const angleToTop = Math.atan2(t.height_m, dist) * 180 / Math.PI;

  // Draw line on map
  if (gtLineLayer) map.removeLayer(gtLineLayer);
  gtLineLayer = L.polyline([[gtUserPos.lat, gtUserPos.lon], [t.lat, t.lon]], {
    color: '#6dce70', weight: 2, dashArray: '6,4', opacity: 0.7,
  }).addTo(map);

  // Compass needle
  document.getElementById('gt-compass-needle').style.transform = `translate(-50%, -100%) rotate(${bearing}deg)`;

  stats.innerHTML = `
    <div class="gt-row"><span class="gt-label">Bearing</span><span class="gt-value bearing">${bearing.toFixed(1)}&deg; ${compassDir(bearing)}</span></div>
    <div class="gt-row"><span class="gt-label">Distance</span><span class="gt-value">${useFeet ? (dist * 3.28084).toFixed(0) + ' ft' : dist.toFixed(0) + ' m'}</span></div>
    <div class="gt-row"><span class="gt-label">Angle to Top</span><span class="gt-value">${angleToTop.toFixed(1)}&deg;</span></div>
    <div class="gt-row"><span class="gt-label">Satellite Est.</span><span class="gt-value">${fmtH(t.height_m)} &pm;${fmtH1(t.error_m)}</span></div>
  `;
}

function calculateHeight() {
  const distTop = parseFloat(document.getElementById('gt-dist-top').value);
  const angleTop = parseFloat(document.getElementById('gt-angle-top').value);
  const distBase = parseFloat(document.getElementById('gt-dist-base').value);
  const angleBase = parseFloat(document.getElementById('gt-angle-base').value);
  const eyeH = parseFloat(document.getElementById('gt-eye-height').value) || 1.65;

  if ([distTop, angleTop, distBase, angleBase].some(isNaN)) {
    document.getElementById('gt-result').innerHTML =
      '<div style="color:#ff4444; font-size:11px; margin-top:8px;">Fill in all measurement fields</div>';
    return;
  }

  const toRad = d => d * Math.PI / 180;

  // Tree height = vertical component to crown + vertical component to base
  // h_top = distTop * sin(angleTop)  (positive = looking up)
  // h_base = distBase * sin(angleBase) (negative = looking down, or small positive)
  // total height = h_top - h_base
  // If standing level with base: h_base ≈ 0, total ≈ h_top + eyeHeight

  const hTop = distTop * Math.sin(toRad(angleTop));
  const hBase = distBase * Math.sin(toRad(angleBase));
  const measuredHeight = hTop - hBase;

  // Horizontal distances for sanity check
  const horizTop = distTop * Math.cos(toRad(angleTop));
  const horizBase = distBase * Math.cos(toRad(angleBase));

  const resultDiv = document.getElementById('gt-result');

  if (measuredHeight <= 0 || measuredHeight > 200) {
    resultDiv.innerHTML =
      '<div style="color:#ff4444; font-size:11px; margin-top:8px;">Result out of range — check angle signs (up = positive, down = negative)</div>';
    return;
  }

  // Compare with satellite
  const satH = gtSelectedTree ? gtSelectedTree.height_m : 0;
  const delta = measuredHeight - satH;
  const absDelta = Math.abs(delta);
  let deltaClass = 'close';
  if (absDelta > 10) deltaClass = 'far';
  else if (absDelta > 5) deltaClass = 'off';

  const deltaDisp = useFeet ? Math.abs(delta * 3.28084).toFixed(1) : absDelta.toFixed(1);
  const deltaSign = delta >= 0 ? '+' : '-';
  const deltaLabel = `${deltaSign}${useFeet ? (Math.abs(delta) * 3.28084).toFixed(1) + ' ft' : delta.toFixed(1) + ' m'}`;

  resultDiv.innerHTML = `
    <div class="gt-result">
      <div class="gt-result-row">
        <span class="gt-result-label">Measured Height</span>
        <span class="gt-result-value">${fmtH1(measuredHeight)}</span>
      </div>
      <div class="gt-result-row">
        <span class="gt-result-label">Satellite Estimate</span>
        <span class="gt-result-value">${fmtH(satH)} ±${fmtH1(gtSelectedTree ? gtSelectedTree.error_m : 0)}</span>
      </div>
      <div class="gt-result-row">
        <span class="gt-result-label">Difference</span>
        <span class="gt-result-delta ${deltaClass}">${deltaLabel}</span>
      </div>
      <div class="gt-result-row">
        <span class="gt-result-label">Horiz. Dist (top)</span>
        <span class="gt-result-value">${fmtH1(horizTop)}</span>
      </div>
      <div class="gt-result-row">
        <span class="gt-result-label">Horiz. Dist (base)</span>
        <span class="gt-result-value">${fmtH1(horizBase)}</span>
      </div>
    </div>
  `;
}

// Close modal on Escape
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeGtModal(); });
</script>
